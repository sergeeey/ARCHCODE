name: Security Gates

on:
  pull_request:
  push:
    branches: [main]

jobs:
  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install JS dependencies
        run: npm ci

      - name: Install Python security tooling
        run: pip install bandit

      - name: Secret scan
        run: npm run security:secrets

      - name: Lint gate
        run: npm run lint

      - name: Build gate
        run: npm run build

      - name: Unit test gate
        run: npm test

      - name: Coverage gate (60/55/60/60)
        run: npm run test:coverage

      - name: Gold-standard regression gate (mock smoke)
        env:
          ALPHAGENOME_TEST_MODE: mock
        run: npm run test:gold

      - name: Enforce strict-real key on main push
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if [ -z "${{ secrets.ALPHAGENOME_API_KEY }}" ]; then
            echo "ALPHAGENOME_API_KEY is required for main push strict-real gate."
            exit 1
          fi

      - name: Gold-standard regression gate (strict-real, main push)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          ALPHAGENOME_TEST_MODE: strict-real
          ALPHAGENOME_API_KEY: ${{ secrets.ALPHAGENOME_API_KEY }}
        run: npm run test:gold

      - name: Dependency audit (high+)
        run: npm run security:deps

      - name: Python security scan (high)
        run: npm run security:python
